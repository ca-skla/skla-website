# Netlify configuration for the SKLA static site.
# No build step — files are served as-is from the repo root.

[build]
  publish = "."
  command = ""

# --- Redirects from old WordPress clean URLs to new .html pages ---
[[redirects]]
  from = "/about-us/"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/our-services/"
  to = "/services.html"
  status = 301
  force = true

# Clientele has been replaced by the Industries page (same content).
[[redirects]]
  from = "/clientele/"
  to = "/industries.html"
  status = 301
  force = true

[[redirects]]
  from = "/clientele.html"
  to = "/industries.html"
  status = 301
  force = true

[[redirects]]
  from = "/careers/"
  to = "/careers.html"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact.html"
  status = 301
  force = true

# Catch-all 404 -> custom not-found page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# --- Security / caching headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Images rarely change — cache hard for a year.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS keep stable filenames, so they must revalidate — this ensures
# design/script updates always reach returning visitors on their next visit.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
