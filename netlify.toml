# Netlify configuration for the SKLA static site.
# No build step — files are served as-is from the repo root.

[build]
  publish = "."
  command = ""

# --- Redirects from old WordPress clean URLs to new .html pages ---
[[redirects]]
  from = "/about-us/"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/our-services/"
  to = "/services.html"
  status = 301
  force = true

# Clientele has been replaced by the Industries page (same content).
[[redirects]]
  from = "/clientele/"
  to = "/industries.html"
  status = 301
  force = true

[[redirects]]
  from = "/clientele.html"
  to = "/industries.html"
  status = 301
  force = true

[[redirects]]
  from = "/careers/"
  to = "/careers.html"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact.html"
  status = 301
  force = true

# Catch-all 404 -> custom not-found page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# --- Security / caching headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
